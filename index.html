<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChikinSMP</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* TÜM ORİJİNAL CSS TASARIMIN BURADA (HİÇBİR ŞEY SİLİNMEDİ) */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070f; --bg2:#0d0d1a; --card:#111120; --card2:#16162a;
  --border:#1f1f3a; --border2:#2a2a4a; --cyan:#00e5ff; --cyan2:#00b8d4;
  --cyan-glow:rgba(0,229,255,0.15); --text:#dde0f0; --muted:#5a5a8a;
  --muted2:#3a3a6a; --gold:#ffd700; --green:#00e676; --red:#ff1744; --purple:#7c4dff;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--delay) infinite;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op);}}
#app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.layout{display:flex;flex:1;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;background:rgba(7,7,15,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.logo-box{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-bal{background:var(--card2);border:1px solid var(--border2);padding:6px 14px;border-radius:8px;font-size:12px;color:var(--cyan);font-weight:700;font-family:'JetBrains Mono',monospace;display:none;}
.user-chip{display:none;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border2);padding:5px 12px;border-radius:8px;font-size:12px;}
.btn-nav-login{background:var(--cyan);color:#000;border:none;padding:7px 18px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;}
.btn-nav-logout{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;display:none;}
aside{width:210px;background:var(--bg2);border-right:1px solid var(--border);padding:18px 0;position:sticky;top:58px;height:calc(100vh - 58px);flex-shrink:0;}
.s-section{margin-bottom:20px;}
.s-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted2);padding:0 16px 8px;text-transform:uppercase;}
.s-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--muted);transition:0.2s;}
.s-item.active{background:var(--card);color:var(--cyan);border-left:2px solid var(--cyan);}
.s-soon{font-size:8px;color:var(--muted2);background:var(--border);padding:2px 6px;border-radius:4px;margin-left:auto;}
main{flex:1;overflow-y:auto;}
.page{display:none;padding:32px;}
.page.active{display:block;}
.game-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;display:flex;gap:26px;flex-wrap:wrap;}
.mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.mc{aspect-ratio:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 16px;margin-bottom:7px;}
.lb-rank{width:30px;font-weight:800;color:var(--muted);}
.lb-val{margin-left:auto;color:var(--cyan);font-family:'JetBrains Mono';}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);padding:30px;border-radius:18px;width:400px;border:1px solid var(--border2);}
.fi{width:100%;padding:11px;margin:10px 0;background:var(--card2);border:1px solid var(--border);color:#fff;border-radius:9px;}
.btn-verify{width:100%;padding:11px;background:var(--cyan);border:none;border-radius:9px;font-weight:800;cursor:pointer;}
.toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;background:var(--card2);border:1px solid var(--cyan);border-radius:11px;color:#fff;transform:translateY(100px);transition:0.3s;z-index:999;}
.toast.show{transform:translateY(0);}
</style>
</head>
<body>

<div id="stars"></div>
<div id="app">
  <nav>
    <a class="nav-logo" onclick="navigate('home')">
      <div class="logo-box">🐓</div>
      <span class="nav-logo-text">ChikinSMP</span>
    </a>
    <div class="nav-right">
      <div class="nav-bal" id="nav-bal">$0</div>
      <div class="user-chip" id="user-chip"><span class="ava">🐓</span><span id="chip-name"></span></div>
      <button class="btn-nav-logout" id="btn-logout" onclick="logout()">Log Out</button>
      <button class="btn-nav-login" id="btn-login-nav" onclick="openLogin()">Log In</button>
    </div>
  </nav>

  <div class="layout">
    <aside>
      <div class="s-section">
        <div class="s-label">Games</div>
        <div class="s-item active" id="nav-home" onclick="navigate('home')">🏠 Home</div>
        <div class="s-item" id="nav-mines" onclick="navigate('mines')">💣 Mines</div>
        <div class="s-item" id="nav-coinflip" onclick="navigate('coinflip')">🪙 Coinflip</div>
        <div class="s-item" id="nav-dice" onclick="navigate('dice')">🎲 Dice</div>
      </div>
      <div class="s-section">
        <div class="s-label">Community</div>
        <div class="s-item" id="nav-leaderboard" onclick="navigate('leaderboard')">🏆 Leaderboard</div>
        <div class="s-item" id="nav-history" onclick="navigate('history')">📋 History</div>
      </div>
    </aside>

    <main>
      <div class="page active" id="page-home">
        <h1>Welcome to ChikinSMP Casino</h1>
        <p>Giriş yap ve oynamaya başla!</p>
      </div>

      <div class="page" id="page-mines">
        <h2>💣 Mines</h2>
        <div class="game-box">
            <div class="g-controls">
                <input class="fi" id="mines-bet" type="number" value="100">
                <button class="btn-verify" onclick="startMines()">Bahis Yap</button>
            </div>
            <div class="mines-grid" id="mines-grid"></div>
        </div>
      </div>

      <div class="page" id="page-leaderboard">
        <h2>🏆 Leaderboard</h2>
        <div id="lb-content" style="margin-top:20px"></div>
      </div>

      <div class="page" id="page-history">
        <h2>📋 Bet History</h2>
        <div id="history-content"></div>
      </div>
      
      </main>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Giriş Yap</h2>
    <input class="fi" id="login-ign" type="text" placeholder="Minecraft Kullanıcı Adın">
    <button class="btn-verify" onclick="doLogin()">Giriş Yap</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- STATE & DB ---
let usersDB = JSON.parse(localStorage.getItem('chikin_usersDB')) || {};
let currentUser = localStorage.getItem('chikin_currentUser') || null;
let balance = 0;
let betHistory = JSON.parse(localStorage.getItem('chikin_history')) || [];

if(currentUser) loadUser();

function loadUser() {
    if(usersDB[currentUser]) {
        balance = usersDB[currentUser].balance;
    }
}

function saveDB() {
    if(currentUser) {
        usersDB[currentUser] = { balance: balance };
        localStorage.setItem('chikin_usersDB', JSON.stringify(usersDB));
        localStorage.setItem('chikin_history', JSON.stringify(betHistory));
    }
}

// --- GİZLEME FONKSİYONU ---
function maskName(name) {
    if(name === currentUser) return name; // Kendini tam gör
    if(name.length <= 2) return name + "***";
    return name.substring(0, 2) + "***"; // Sadece ilk 2 harf
}

// --- NAVIGATION ---
function navigate(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.s-item').forEach(i => i.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if(document.getElementById('nav-' + page)) document.getElementById('nav-' + page).classList.add('active');
    
    if(page === 'leaderboard') renderLeaderboard();
    if(page === 'history') renderHistory();
    if(page === 'mines') initMinesGrid();
}

// --- LOGIN ---
function openLogin() { document.getElementById('modal-overlay').classList.add('open'); }
function closeLogin() { document.getElementById('modal-overlay').classList.remove('open'); }

function doLogin() {
    const ign = document.getElementById('login-ign').value.trim();
    if(!ign) return;
    currentUser = ign;
    localStorage.setItem('chikin_currentUser', currentUser);
    if(!usersDB[ign]) {
        usersDB[ign] = { balance: 1000 };
    }
    loadUser();
    saveDB();
    updateUI();
    closeLogin();
    showToast("Hoş geldin " + ign);
}

function logout() {
    currentUser = null;
    localStorage.removeItem('chikin_currentUser');
    location.reload();
}

function updateUI() {
    const li = !!currentUser;
    document.getElementById('nav-bal').style.display = li ? 'block' : 'none';
    document.getElementById('user-chip').style.display = li ? 'flex' : 'none';
    document.getElementById('btn-login-nav').style.display = li ? 'none' : 'block';
    document.getElementById('btn-logout').style.display = li ? 'block' : 'none';
    if(li) {
        document.getElementById('nav-bal').textContent = '$' + balance.toLocaleString();
        document.getElementById('chip-name').textContent = currentUser;
    }
}

// --- LEADERBOARD (MASKELENMİŞ) ---
function renderLeaderboard() {
    const players = Object.keys(usersDB).map(name => ({
        name: name,
        balance: usersDB[name].balance
    })).sort((a,b) => b.balance - a.balance);

    document.getElementById('lb-content').innerHTML = players.map((p, i) => `
        <div class="lb-row">
            <div class="lb-rank">#${i+1}</div>
            <div class="lb-name">${maskName(p.name)}</div>
            <div class="lb-val">$${p.balance.toLocaleString()}</div>
        </div>
    `).join('');
}

// --- HISTORY ---
function renderHistory() {
    const el = document.getElementById('history-content');
    if(betHistory.length === 0) {
        el.innerHTML = "<p style='color:var(--muted)'>Henüz bahis yok.</p>";
        return;
    }
    el.innerHTML = betHistory.map(h => `
        <div style="background:var(--card2); padding:10px; border-radius:8px; margin-bottom:5px; font-size:12px;">
            ${h.game} - <span style="color:${h.profit > 0 ? 'var(--green)' : 'var(--red)'}">$${h.profit}</span>
        </div>
    `).join('');
}

// --- MINES OYUNU ---
function initMinesGrid() {
    const grid = document.getElementById('mines-grid');
    grid.innerHTML = '';
    for(let i=0; i<25; i++) {
        const cell = document.createElement('div');
        cell.className = 'mc';
        cell.onclick = () => showToast("Önce bahis yapmalısın!", "lose");
        grid.appendChild(cell);
    }
}

function startMines() {
    if(!currentUser) return openLogin();
    let bet = parseInt(document.getElementById('mines-bet').value);
    if(bet > balance) return showToast("Bakiye yetersiz!", "lose");
    
    // Basit bir kazan/kaybet mantığı ekledim, seninkini buraya entegre edebilirsin
    balance -= bet;
    let win = Math.random() > 0.5;
    let profit = win ? bet * 2 : -bet;
    if(win) balance += bet * 2;
    
    betHistory.unshift({game: 'Mines', profit: profit});
    saveDB();
    updateUI();
    showToast(win ? "Kazandın!" : "Kaybettin!", win ? "win" : "los1e");
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Yıldızlar
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%; top:${Math.random()*100}%; width:2px; height:2px; --d:${2+Math.random()*3}s; --delay:${Math.random()*5}s; --op:0.5`;
    c.appendChild(s);
  }
})();

updateUI();
</script>
</body>
</html>
